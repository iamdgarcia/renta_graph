name: Compile Wiki

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 06:00 UTC

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            scraper/requirements.txt
            compiler/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install compiler dependencies
        run: pip install -r compiler/requirements.txt

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python pipeline.py all

      - name: Commit updated wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/content/wiki/
          git diff --cached --quiet || git commit -m "chore: update wiki (automated)"
          git push
